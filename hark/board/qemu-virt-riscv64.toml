platform = "qemu-virt-riscv"
boot_flash_address = 0x2000_0000
boot_flash_size = 0x200_0000

# For size discipline, we constrain the available boot RAM to 64KiB.
# (Keep in sync with qemu-virt-riscv32.toml.)
boot_ram_address = 0x8000_0000
boot_ram_size = 0x1_0000

[qemu]
cpu = "rv64,h=false,s=false"
machine = "virt"
memory = "64K"
flash_size = "32M"
